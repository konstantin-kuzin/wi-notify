<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WI Notify — настройки</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="options">
      <h1 class="options__title">Настройки</h1>

      <form id="options-form" class="options__form">
        <label class="options__field">
          <span class="options__label">Коллекция</span>
          <input
            class="options__input"
            id="api-root"
            name="apiRoot"
            type="url"
            autocomplete="off"
            placeholder="https://…/tfs/DefaultCollection"
            required
          >
          <span class="options__hint">Формат: https://<сервер>/tfs/<имя_коллекции>. Для dev.azure.com: <code>https://dev.azure.com/&lt;org&gt;</code></span>
        </label>

        <label class="options__field">
          <span class="options__label">Проект</span>
          <input class="options__input" id="project" name="project" type="text" required>
          <span class="options__hint">Например, Monorepo</span>
        </label>

        <label class="options__field">
          <span class="options__label">Iteration Path</span>
          <select class="options__input" id="iteration-path" name="iterationPath">
            <option value="">All</option>
          </select>
          <span class="options__hint">Filter work items by iteration. "All" shows all iterations.</span>
        </label>





         <div class="options__actions">
           <button class="options__button" type="button" id="save-button">Сохранить</button>
           <span class="options__status" id="save-status" role="status"></span>
         </div>
      </form>
    </main>
    <script type="module" src="options.mjs"></script>
  </body>
</html>
