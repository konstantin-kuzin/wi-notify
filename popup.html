<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Work Items</title>
    <link rel="stylesheet" href="popup.css?v=2">
  </head>
  <body>
    <main class="popup">
      <header class="popup__header">
        <div class="popup__header-main">
          <h1 class="popup__title">My Work Items</h1>
        </div>
        <div class="popup__header-status">
          <p class="popup__last-updated" id="last-updated">ещё не выполнялась</p>
          <button
            class="popup__refresh"
            id="refresh-button"
            type="button"
            aria-label="Обновить сейчас"
            title="Обновить сейчас"
          ></button>
          <div class="popup__count" id="count-badge">0</div>
        </div>
      </header>

      <section class="popup__message hidden" id="message-box"></section>

      <section class="popup__toolbar" aria-label="Фильтр и поиск work items">
        <div class="popup__filters">
          <button type="button" class="popup__filter-button popup__filter-button--active" data-filter="all">Все</button>
          <button type="button" class="popup__filter-button" data-filter="active">Active</button>
          <button type="button" class="popup__filter-button" data-filter="proposed">Proposed</button>
          <button type="button" class="popup__filter-button" data-filter="resolved">Resolved</button>
        </div>
        <div class="popup__search">
          <label class="popup__search-label" for="search-input">Поиск</label>
          <div class="popup__search-field">
            <input
              type="search"
              id="search-input"
              class="popup__search-input"
              placeholder="Найти…"
              enterkeyhint="search"
              autocomplete="off"
              spellcheck="false"
            />
            <button
              type="button"
              class="popup__search-clear hidden"
              id="search-clear"
              aria-label="Очистить поиск"
              title="Очистить поиск"
            >×</button>
          </div>
        </div>
      </section>

      <section class="popup__timesheet-notice hidden" id="timesheet-status"></section>

      <section class="popup__content">
        <div class="popup__empty hidden" id="empty-state">Нет активных work items</div>
        <ul class="popup__list" id="items-list"></ul>
      </section>

      <footer class="popup__footer">
        <a
          class="popup__github-link"
          href="https://github.com/konstantin-kuzin/wi-notify"
          target="_blank"
          rel="noopener noreferrer"
        >GitHub</a>
        <button type="button" class="popup__options-link" id="options-link">Настройки</button>
      </footer>
    </main>

    <script type="module" src="popup.mjs"></script>
  </body>
</html>
